<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" href="./assets/favicon.png" type="image/png">
    <title>IRON GYM | Painel Administrativo</title>
    <style>
        :root {
            --gym-black: #0f0f10;
            --gym-gold: #c5a059;
            --gym-white: #e5e5e5;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #c5a059 0%, #947a44 100%);
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        input,
        select {
            color-scheme: dark;
        }

        /* Sistema de Modal com Animação */
        #modal-aluno {
            transition: all 0.3s ease-in-out;
            opacity: 0;
            visibility: hidden;
            /* Em vez de hidden do tailwind */
            pointer-events: none;
        }

        #modal-aluno.modal-active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        #modal-aluno .glass-card {
            transform: scale(0.95);
            transition: transform 0.3s ease-in-out;
        }

        #modal-aluno.modal-active .glass-card {
            transform: scale(1);
        }
    </style>
</head>

<body class="bg-[#0f0f10] text-[#e5e5e5] min-h-screen font-sans">

    <!-- LOGIN -->
    <section id="login-section" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-md p-10 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black tracking-tighter text-[#c5a059] uppercase italic">IRON <span
                        class="text-white">ADM</span></h1>
                <p class="text-[10px] tracking-[0.3em] text-zinc-500 uppercase mt-2 font-bold">Acesso Restrito ao
                    Sistema</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-widest text-[#c5a059] mb-2 font-bold">Utilizador</label>
                    <input type="text" id="user" required
                        class="w-full bg-black/40 border border-zinc-800 rounded-xl p-4 outline-none focus:border-[#c5a059]">
                </div>
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-widest text-[#c5a059] mb-2 font-bold">Palavra-passe</label>
                    <input type="password" id="pass" required
                        class="w-full bg-black/40 border border-zinc-800 rounded-xl p-4 outline-none focus:border-[#c5a059]">
                </div>
                <button type="submit"
                    class="w-full gold-gradient text-black font-black uppercase py-4 rounded-xl hover:opacity-90 cursor-pointer">Entrar
                    no Painel</button>
            </form>
        </div>
    </section>

    <!-- PAINEL ADMIN -->
    <section id="admin-panel" class="hidden min-h-screen flex flex-col">
        <header
            class="w-full flex justify-between items-center px-10 py-6 border-b border-[#c5a059]/20 bg-black/40 backdrop-blur-md sticky top-0 z-40">
            <h1 class="text-3xl font-black tracking-tighter text-[#c5a059] uppercase italic">IRON <span
                    class="text-white">GYM</span></h1>
            <button onclick="logout()"
                class="text-xs font-bold border border-red-500/50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500/10 cursor-pointer">SAIR</button>
        </header>

        <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold uppercase tracking-widest">Gestão de Alunos</h2>
                <button onclick="abrirModalCadastro()"
                    class="gold-gradient text-black px-6 py-3 rounded-xl font-bold uppercase text-sm cursor-pointer shadow-lg shadow-gold/20">
                    + Novo Aluno
                </button>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-[#c5a059]/10 text-[#c5a059] text-xs uppercase tracking-widest">
                        <tr>
                            <th class="p-6">Nome</th>
                            <th class="p-6">CPF</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios" class="divide-y divide-zinc-800/50">
                        <tr>
                            <td colspan="4" class="p-5 text-center text-zinc-500 italic">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </section>

    <!-- MODAL -->
    <div id="modal-aluno" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="glass-card w-full max-w-lg p-10 rounded-3xl">
            <h3 id="modal-titulo" class="text-[#c5a059] text-2xl font-black uppercase italic mb-8">Novo Cadastro</h3>
            <form id="form-aluno-modal" class="space-y-5">
                <input type="text" id="nome-modal" placeholder="Nome do Aluno" required
                    class="w-full bg-black/60 border border-zinc-800 p-4 rounded-xl outline-none focus:border-[#c5a059]">
                <input type="text" id="cpf-modal" placeholder="CPF" maxlength="14" required
                    class="w-full bg-black/60 border border-zinc-800 p-4 rounded-xl outline-none focus:border-[#c5a059]">
                <select id="plano-modal"
                    class="w-full bg-black/60 border border-zinc-800 p-4 rounded-xl outline-none focus:border-[#c5a059]">
                    <option value="true">Ativo(a)</option>
                    <option value="false">Inativo(a)</option>
                </select>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="fecharModal()"
                        class="flex-1 bg-zinc-900 py-4 rounded-xl font-bold uppercase text-xs cursor-pointer">Cancelar</button>
                    <button type="submit"
                        class="flex-1 gold-gradient text-black py-4 rounded-xl font-black uppercase text-xs cursor-pointer">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LINK PARA O SCRIPT SEPARADO -->
    <script src="script.js" defer></script>
</body>

</html>
